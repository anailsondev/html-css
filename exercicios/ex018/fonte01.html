<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Fontes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        body {
            font-family: 'work Sans', Arial, Verdana, sans-serif ;
            font-size: 16px;
            color: black;
        }
        h1 {
            font-family: 'Permanent+Marker' serif;
            font-size: 3em;
        }
        h2{
            font-family: 'Permanent+Marker' serif;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eligendi, dolores veritatis nemo nisi quae reiciendis numquam natus doloribus exercitationem error tempore maiores asperiores veniam tenetur odit. At, commodi corporis? Provident!</p>
</body>
</html>
