<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
           Seletores Personalizados
         # = id
           . = class
           : = pseudo-class
           :: = pseudo-element
           > = clildren
           */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: red;
        }
        a:hover {
            color: black;
            text-decoration: underline;

        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
